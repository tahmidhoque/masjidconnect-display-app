# METABEGIN
# X-Env-Layer-Name: masjidconnect-display
# X-Env-Layer-Desc: MasjidConnect Display App — Node server + Chromium kiosk (X11/xinit).
#   Expects app archive at IGconf_masjidconnect_app_archive (tar.gz from npm run package).
# X-Env-Layer-Requires: rpi-user-credentials,systemd-net-min
#
# X-Env-VarPrefix: masjidconnect
# X-Env-Var-app_archive: app/masjidconnect-display.tar.gz
# X-Env-Var-app_archive-Desc: Path to masjidconnect-display-*.tar.gz (relative to -S or absolute)
# X-Env-Var-app_archive-Required: n
# X-Env-Var-app_archive-Set: y
# X-Env-Var-wifi_ssid: Optional. WiFi SSID to bake into image (or use wifi.conf in source root).
# X-Env-Var-wifi_password: Optional. WiFi passphrase (or use wifi.conf).
# X-Env-Var-wifi_country: Optional. Two-letter country code (e.g. GB). Default GB.
# X-Env-Var-timezone: Optional. IANA timezone (e.g. Europe/London, America/New_York). Default UTC.
# X-Env-Var-timezone-Desc: Sets the system timezone so DST is applied correctly. Overridable at runtime via TIMEZONE= in /boot/firmware/masjidconnect-wifi.conf.
# METAEND
---
mmdebstrap:
  packages:
    - chromium
    - dbus
    - libgl1-mesa-dri
    - openssh-server
    - curl
    - ca-certificates
    - plymouth
    - initramfs-tools
    - xserver-xorg-core
    - xserver-xorg
    - xinit
    - x11-xserver-utils
    - unclutter
    - feh
    - kbd
    - network-manager
    - wpasupplicant
    - polkitd
    - iw
    - iproute2
    - wireless-regdb
    # NOTE: firmware-brcm80211 is intentionally NOT listed here.
    # rpi-image-gen's rpi4/rpi5 device layers include raspberrypi-firmware which
    # provides the board-specific brcmfmac firmware files (including the CLM blob
    # and per-board .txt configs) required for AP mode. Installing the generic
    # Debian firmware-brcm80211 package can overwrite these with incompatible
    # generic firmware that lacks AP mode support on RPi hardware.
    - raspi-config
    - tzdata
    - fake-hwclock
    - dnsmasq
  customize-hooks:
    # Install Node.js 20 from NodeSource (build host needs network)
    - |
      chroot $1 /bin/bash -c 'curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs' || true
    # Extract app archive to /opt/masjidconnect (path relative to -S or absolute). One line so YAML does not parse colons as map; use |- so it stays a string.
    - |
      ARCHIVE="${IGconf_masjidconnect_app_archive:-app/masjidconnect-display.tar.gz}"; [ -z "$ARCHIVE" ] && { echo "MasjidConnect app archive path not set (IGconf_masjidconnect_app_archive)"; exit 1; }; [ ! -f "$ARCHIVE" ] && { echo "MasjidConnect app archive not found: $ARCHIVE"; exit 1; }; mkdir -p "$1/opt/masjidconnect"; cp "$ARCHIVE" "$1/tmp/masjidconnect-app.tar.gz"; chroot "$1" /bin/bash -c "tar -xzf /tmp/masjidconnect-app.tar.gz -C /opt/masjidconnect && rm /tmp/masjidconnect-app.tar.gz"
    # Ownership (pi user is typically 1000:1000)
    - chroot $1 /bin/bash -c 'chown -R 1000:1000 /opt/masjidconnect'
    - chroot $1 /bin/bash -c 'chmod +x /opt/masjidconnect/deploy/xinitrc-kiosk /opt/masjidconnect/deploy/start-kiosk-x11.sh /opt/masjidconnect/deploy/start-kiosk-now.sh /opt/masjidconnect/deploy/wifi-setup-server.mjs /opt/masjidconnect/deploy/wifi-hotspot.sh /opt/masjidconnect/deploy/update-from-github.sh 2>/dev/null || true'
    # Deploy overlay: copy kiosk scripts from repo so image has them even if the app archive was built before they were added.
    - |
      if [ -d "${SRCROOT}/deploy-overlay" ]; then
        chroot "$1" mkdir -p /opt/masjidconnect/deploy
        for f in "${SRCROOT}"/deploy-overlay/*; do
          [ -f "$f" ] && cp "$f" "$1/opt/masjidconnect/deploy/" && chroot "$1" chmod +x "/opt/masjidconnect/deploy/$(basename "$f")"
        done
      fi
    # Kiosk user needs render/video for X11/Chromium GPU. Base layer creates user pi (rpi-user-credentials).
    - chroot $1 /bin/bash -c 'getent group render >/dev/null || groupadd -r render; getent group video >/dev/null || groupadd -r video; usermod -aG render,video pi'
    # Add pi to the netdev group — members of this group can control networking via
    # NetworkManager without polkit authentication (standard Debian NM convention).
    # The group may not exist in a minimal image so create it first.
    - chroot $1 /bin/bash -c 'getent group netdev >/dev/null || groupadd -r netdev; usermod -aG netdev pi'
    # Polkit rule: grant root and netdev-group members unconditional NM access.
    # Without this, nmcli called from server.mjs (which runs as pi, not root) is denied
    # for all operations that mutate network state (connect, disconnect, forget, etc.).
    # This also ensures the hotspot start/stop from wifi-hotspot.sh works reliably.
    - |
      mkdir -p "$1/etc/polkit-1/rules.d"
      printf '%s\n' \
        'polkit.addRule(function(action, subject) {' \
        '    if (action.id.indexOf("org.freedesktop.NetworkManager.") === 0 &&' \
        '        (subject.user === "root" || subject.isInGroup("netdev"))) {' \
        '        return polkit.Result.YES;' \
        '    }' \
        '});' \
        > "$1/etc/polkit-1/rules.d/50-nm-users.rules"
      chmod 644 "$1/etc/polkit-1/rules.d/50-nm-users.rules"
    # Wi-Fi state dir for connectivity marker (first-run vs known-wifi-offline)
    - chroot $1 /bin/bash -c 'mkdir -p /var/lib/masjidconnect && chown 1000:1000 /var/lib/masjidconnect'
    # Set a known default password for the first user (UID 1000) so SSH works when Pi Imager cannot apply OS customisation to custom images.
    - |
      chroot $1 /bin/bash -c 'u=$(getent passwd 1000 | cut -d: -f1); [ -n "$u" ] && echo "${u}:masjidconnect" | chpasswd'
    # Ensure KMS (vc4) and GPU memory for X11/Chromium on RPi 3/4/5; disable early RPI splash
    - |
      CFG="$1/boot/firmware/config.txt"
      [ -f "$CFG" ] || CFG="$1/boot/config.txt"
      if [ -f "$CFG" ]; then
        grep -q "^dtoverlay=vc4-kms-v3d" "$CFG" || echo "dtoverlay=vc4-kms-v3d" >> "$CFG"
        grep -q "^gpu_mem=" "$CFG" && sed -i 's/^gpu_mem=.*/gpu_mem=128/' "$CFG" || echo "gpu_mem=128" >> "$CFG"
        grep -q "^disable_splash=" "$CFG" || echo "disable_splash=1" >> "$CFG"
        grep -q "^disable_overscan=" "$CFG" && sed -i 's/^disable_overscan=.*/disable_overscan=1/' "$CFG" || echo "disable_overscan=1" >> "$CFG"
      fi
    # Disable HDMI overscan (KMS) so display is not cut off on TVs
    - chroot $1 raspi-config nonint do_overscan_kms 1 1 || true
    # Silent boot: redirect console to tty2 so no kernel/init text on tty1 (X11 kiosk uses tty1).
    # POSIX sh — mmdebstrap hooks run with sh, not bash, so no [[ ]] or bash-isms.
    - |
      CMDLINE="$1/boot/firmware/cmdline.txt"
      [ -f "$CMDLINE" ] || CMDLINE="$1/boot/cmdline.txt"
      if [ -f "$CMDLINE" ]; then
        line=$(cat "$CMDLINE")
        REGDOM="${IGconf_masjidconnect_wifi_country:-GB}"
        for param in quiet loglevel=0 logo.nologo console=tty2 vt.global_cursor_default=0 "cfg80211.ieee80211_regdom=${REGDOM}"; do
          case " $line " in
            *" $param "*) ;;
            *) line="$line $param" ;;
          esac
        done
        echo "$line" > "$CMDLINE"
      fi
    # Xorg: vc4 OutputClass so Pi 4/5 don't hit "Cannot run in framebuffer mode" (modesetting needs PrimaryGPU).
    - mkdir -p "$1/etc/X11/xorg.conf.d" && cp "${SRCROOT}/layer/xorg.conf.d/99-vc4.conf" "$1/etc/X11/xorg.conf.d/"
    # Install display server systemd unit (run as UID 1000 so Pi Imager custom user e.g. mcadmin works)
    - cp $1/opt/masjidconnect/deploy/masjidconnect-display.service $1/etc/systemd/system/ && sed -i 's/^User=pi$/User=1000/' "$1/etc/systemd/system/masjidconnect-display.service" && sed -i 's/^Group=pi$/Group=1000/' "$1/etc/systemd/system/masjidconnect-display.service"
    # Autologin on tty1 so kiosk runs in a user session (Xorg can then open vt1). No mask of getty@tty1.
    - |
      U=$(chroot "$1" getent passwd 1000 | cut -d: -f1)
      [ -n "$U" ] && mkdir -p "$1/etc/systemd/system/getty@tty1.service.d" && sed "s/AUTOLOGIN_USER/$U/" "${SRCROOT}/layer/getty@tty1.service.d/autologin.conf.tpl" > "$1/etc/systemd/system/getty@tty1.service.d/autologin.conf"
    # PAM: allow passwordless console login on tty1 for first user (so autologin never prompts for password).
    - |
      U=$(chroot "$1" getent passwd 1000 | cut -d: -f1)
      if [ -n "$U" ] && [ -f "$1/etc/pam.d/login" ]; then
        LINE="auth sufficient pam_succeed_if.so user = $U tty = tty1"
        grep -qF "pam_succeed_if.so user = $U tty = tty1" "$1/etc/pam.d/login" || { echo "$LINE" | cat - "$1/etc/pam.d/login" > "$1/etc/pam.d/login.tmp" && mv "$1/etc/pam.d/login.tmp" "$1/etc/pam.d/login"; }
      fi
    # Append kiosk start to UID 1000 .profile (console tty1 only)
    - |
      chroot "$1" /bin/bash -c 'H=$(getent passwd 1000 | cut -d: -f6); [ -n "$H" ] && { touch "$H/.profile"; echo "" >> "$H/.profile"; echo "# MasjidConnect kiosk (console only — clear screen and hide cursor before launching X)" >> "$H/.profile"; echo "[ \"\$(tty)\" = \"/dev/tty1\" ] 2>/dev/null && { clear; setterm --cursor off 2>/dev/null; exec /opt/masjidconnect/deploy/start-kiosk-x11.sh; }" >> "$H/.profile"; chown 1000:1000 "$H/.profile"; }'
    # Enable getty@tty2 for debug access (Ctrl+Alt+F2 on a keyboard connected to the Pi).
    # The kernel console is redirected to tty2 via console=tty2 in cmdline.txt, so this
    # gives a login shell for running nmcli, reading /tmp/kiosk.log, etc. when the hotspot
    # or kiosk fails. Without this the user has NO console access on a headless image.
    - chroot $1 systemctl enable getty@tty2.service 2>/dev/null || true
    - rm -f "$1/etc/systemd/system/getty@tty2.service" 2>/dev/null || true
    # Install kiosk setup (adds UID 1000 to render/video at boot) and X11 kiosk unit
    - cp "${SRCROOT}/layer/masjidconnect-kiosk-setup.service" "$1/etc/systemd/system/"
    - cp "${SRCROOT}/layer/masjidconnect-console-vt1.service" "$1/etc/systemd/system/"
    - cp "${SRCROOT}/layer/kiosk-x11.service.tpl" "$1/etc/systemd/system/masjidconnect-kiosk.service"
    - $BDEBSTRAP_HOOKS/enable-units "$1" masjidconnect-kiosk-setup masjidconnect-console-vt1 masjidconnect-display
    # Disable wpa_supplicant auto-start — NetworkManager manages WiFi and activates
    # wpa_supplicant on-demand via D-Bus. We must NOT mask it: masking prevents D-Bus
    # activation entirely, which makes NM mark the WiFi device as "unavailable" and
    # refuse to create AP (hotspot) connections. Disable only, never mask.
    - chroot $1 systemctl disable wpa_supplicant.service 2>/dev/null || true
    # Enable NetworkManager for WiFi management
    - chroot $1 systemctl enable NetworkManager.service 2>/dev/null || true
    # Write NetworkManager.conf — critical for AP mode.
    # plugins=keyfile: use the keyfile backend (not ifupdown) so NM never sees
    # /etc/network/interfaces and treats all devices as managed.
    # wifi.scan-rand-mac-address=no: some brcmfmac/cfg80211 AP mode builds reject
    # random MAC addresses during AP setup; disable to prevent nmcli AP failures.
    # connectivity.enabled=false: we run our own connectivity check in xinitrc-kiosk;
    # NM's built-in check can race with the hotspot captive-portal and cause confusion.
    - |
      mkdir -p "$1/etc/NetworkManager"
      printf '%s\n' \
        '[main]' \
        'plugins=keyfile' \
        '# Do not honour /etc/network/interfaces — NM manages everything' \
        'no-auto-default=*' \
        '# Use NM built-in DHCP server for ipv4.method=shared (AP/hotspot mode).' \
        '# Avoids spawning a separate dnsmasq process which can fail if port 67/53' \
        '# is already in use or the dnsmasq binary is missing/masked.' \
        'dhcp=internal' \
        '' \
        '[keyfile]' \
        'path=/etc/NetworkManager/system-connections' \
        '' \
        '[device]' \
        '# Disable MAC address randomisation during WiFi scans and AP setup.' \
        '# Some Broadcom (brcmfmac) drivers reject AP activation when the MAC is randomised.' \
        'wifi.scan-rand-mac-address=no' \
        '' \
        '[connectivity]' \
        '# Disable NM built-in connectivity check — xinitrc-kiosk handles this.' \
        '# NM portal detection can interfere with our captive-portal redirect (192.168.4.1).' \
        'enabled=false' \
        '' \
        '[logging]' \
        'level=INFO' \
        > "$1/etc/NetworkManager/NetworkManager.conf"
      chmod 644 "$1/etc/NetworkManager/NetworkManager.conf"
    # Install a tiny one-shot service that sets the WiFi regulatory domain at boot,
    # before NetworkManager starts. This is required for brcmfmac (Broadcom WiFi on
    # RPi) because `cfg80211.ieee80211_regdom=GB` in cmdline.txt only sets the kernel
    # software domain — the firmware's CLM (Country Locale Matrix) stays at country 99
    # ("unset") until an nl80211 per-PHY reg set command is sent. Country 99 silently
    # disables AP beacon transmission, so the hotspot appears to activate but the SSID
    # never shows up on phones. The `iw phy <phy> reg set GB` command propagates into
    # the brcmfmac CLM and unlocks AP mode transmission on 2.4 GHz channels.
    - |
      REGDOM="${IGconf_masjidconnect_wifi_country:-GB}"
      mkdir -p "$1/etc/systemd/system"
      printf '%s\n' \
        '[Unit]' \
        'Description=Set WiFi regulatory domain for brcmfmac CLM (AP mode)' \
        'DefaultDependencies=no' \
        'Before=NetworkManager.service' \
        'After=sys-subsystem-net-devices-wlan0.device' \
        '' \
        '[Service]' \
        'Type=oneshot' \
        'RemainAfterExit=yes' \
        "ExecStart=/bin/sh -c 'iw reg set ${REGDOM} 2>/dev/null; for phy in \$(ls /sys/class/ieee80211/ 2>/dev/null); do iw phy \$phy reg set ${REGDOM} 2>/dev/null || true; done'" \
        '' \
        '[Install]' \
        'WantedBy=network.target' \
        > "$1/etc/systemd/system/masjidconnect-regdom.service"
      chroot "$1" systemctl enable masjidconnect-regdom.service 2>/dev/null || true
    # Disable systemd-networkd — having both NM and networkd active causes device
    # management conflicts. networkd claims the WiFi interface first; NM then sees it
    # as "externally managed" and refuses to control it, breaking AP mode entirely.
    # NM handles DHCP and DNS natively; networkd is not needed.
    - chroot $1 systemctl disable systemd-networkd.service 2>/dev/null || true
    - chroot $1 systemctl mask systemd-networkd.service 2>/dev/null || true
    - chroot $1 systemctl disable systemd-networkd-wait-online.service 2>/dev/null || true
    - chroot $1 systemctl mask systemd-networkd-wait-online.service 2>/dev/null || true
    # Remove any .network files the base layer may have placed that claim wlan0/eth0.
    # These are processed by networkd at runtime and can still influence NM even after
    # networkd is masked (some NM plugins read them). Remove them to be certain.
    - rm -f "$1/etc/systemd/network/"*.network "$1/etc/systemd/network/"*.link 2>/dev/null || true
    # Mask dnsmasq.service — NM invokes the dnsmasq binary directly (shared mode DHCP),
    # it must NOT also run as a standalone systemd service or port 53/67 will conflict.
    - chroot $1 systemctl disable dnsmasq.service 2>/dev/null || true
    - chroot $1 systemctl mask dnsmasq.service 2>/dev/null || true
    # NTP time synchronisation
    # systemd-timesyncd ships inside the systemd package (already present in bookworm-minbase)
    # but is not always enabled in minimal images. Enable it explicitly so the Pi always syncs
    # time from the internet immediately after connecting to WiFi.
    - chroot $1 systemctl enable systemd-timesyncd.service 2>/dev/null || true
    # Write a robust NTP config: use the NTP pool with multiple fallbacks.
    # This is critical for prayer time accuracy — an incorrect clock means wrong prayer times.
    - |
      mkdir -p "$1/etc/systemd"
      printf '%s\n' \
        '[Time]' \
        '# Primary NTP pool — resolves to multiple servers for redundancy' \
        'NTP=0.pool.ntp.org 1.pool.ntp.org 2.pool.ntp.org 3.pool.ntp.org' \
        '# Fallback servers if pool is unreachable' \
        'FallbackNTP=time.cloudflare.com time.google.com ntp.ubuntu.com' \
        '# Tolerate up to 5s of root distance (higher = more tolerant of poor-quality sources)' \
        'RootDistanceMaxSec=5' \
        '# How quickly to poll on a fresh boot vs steady-state (seconds)' \
        'PollIntervalMinSec=32' \
        'PollIntervalMaxSec=2048' \
        > "$1/etc/systemd/timesyncd.conf"
    # fake-hwclock: saves the current time to disk hourly and on shutdown.
    # On next boot the Pi starts with the saved time rather than the epoch (1970),
    # which prevents a massive clock jump when NTP syncs — important for avoiding
    # brief periods where prayer times appear wildly wrong before internet connects.
    # Drop-in: skip fake-hwclock on RPi 5 where a real hardware RTC (/dev/rtc0) is
    # present — the RTC keeps time accurately so fake-hwclock is redundant and would
    # overwrite the accurate RTC time with its (potentially stale) saved timestamp.
    - |
      mkdir -p "$1/etc/systemd/system/fake-hwclock.service.d"
      printf '%s\n' \
        '[Unit]' \
        '# Skip fake-hwclock when the Raspberry Pi 5 hardware RTC (/dev/rtc0) is present.' \
        '# The real RTC is more accurate; fake-hwclock is only needed on Pi 3/4 (no RTC).' \
        'ConditionPathNotExists=/dev/rtc0' \
        > "$1/etc/systemd/system/fake-hwclock.service.d/rtc-override.conf"
    - chroot $1 systemctl enable fake-hwclock.service 2>/dev/null || true
    # RPi 5 RTC sync: read the hardware RTC into the system clock at boot.
    # ConditionPathExists=/dev/rtc0 makes this a no-op on Pi 3/4 (no RTC).
    # After NTP syncs, the Linux kernel automatically writes the corrected time
    # back to the RTC every 11 minutes via its built-in "11-minute mode".
    - '[ -f $1/opt/masjidconnect/deploy/masjidconnect-rtc-sync.service ] && cp $1/opt/masjidconnect/deploy/masjidconnect-rtc-sync.service $1/etc/systemd/system/ || true'
    - chroot $1 systemctl enable masjidconnect-rtc-sync.service 2>/dev/null || true
    # Timezone: set the system timezone. Correct timezone is required for DST (daylight saving)
    # to be applied automatically — NTP always provides UTC, the OS converts using the timezone.
    # Default: UTC. Override at build time with IGconf_masjidconnect_timezone (e.g. Europe/London).
    # Can also be changed at runtime by placing TIMEZONE=<zone> in /boot/firmware/masjidconnect-wifi.conf.
    - |
      TZ="${IGconf_masjidconnect_timezone:-UTC}"
      # Guard: reject empty or metadata placeholder values
      case "$TZ" in "Optional."*|""|"UTC") TZ="UTC" ;; esac
      if [ "$TZ" != "UTC" ]; then
        if chroot "$1" timedatectl set-timezone "$TZ" 2>/dev/null; then
          echo "Timezone set to $TZ"
        elif [ -f "$1/usr/share/zoneinfo/$TZ" ]; then
          ln -sf "/usr/share/zoneinfo/$TZ" "$1/etc/localtime"
          echo "$TZ" > "$1/etc/timezone"
          echo "Timezone set to $TZ (via symlink)"
        else
          echo "WARNING: Unknown timezone '$TZ' — leaving as UTC"
        fi
      fi
    # WiFi boot-partition config: apply credentials dropped on FAT32 /boot/firmware before networking starts
    - '[ -f $1/opt/masjidconnect/deploy/masjidconnect-wifi-bootconf.service ] && cp $1/opt/masjidconnect/deploy/masjidconnect-wifi-bootconf.service $1/etc/systemd/system/ || true'
    - chroot $1 /bin/bash -c 'chmod +x /opt/masjidconnect/deploy/wifi-apply-bootconf.sh 2>/dev/null || true'
    - chroot $1 systemctl enable masjidconnect-wifi-bootconf.service 2>/dev/null || true
    # WiFi watchdog: monitors connectivity and auto-recovers WiFi after disconnections
    - '[ -f $1/opt/masjidconnect/deploy/masjidconnect-wifi-watchdog.service ] && cp $1/opt/masjidconnect/deploy/masjidconnect-wifi-watchdog.service $1/etc/systemd/system/ || true'
    - chroot $1 /bin/bash -c 'chmod +x /opt/masjidconnect/deploy/wifi-watchdog.sh 2>/dev/null || true'
    - chroot $1 systemctl enable masjidconnect-wifi-watchdog.service 2>/dev/null || true
    # Custom boot splash: copy rpi-image/assets/splash.png into Plymouth pix theme and set as default
    - |
      if [ -f "${SRCROOT}/assets/splash.png" ]; then
        mkdir -p "$1/usr/share/plymouth/themes/pix"
        cp "${SRCROOT}/assets/splash.png" "$1/usr/share/plymouth/themes/pix/splash.png"
        chroot "$1" plymouth-set-default-theme pix 2>/dev/null || true
        chroot "$1" /bin/bash -c 'update-initramfs -u' || true
      fi
    # Optional background image (e.g. for in-app or loading); copy to /opt/masjidconnect for app use
    - |
      if [ -f "${SRCROOT}/assets/background.png" ]; then
        cp "${SRCROOT}/assets/background.png" "$1/opt/masjidconnect/background.png"
        chroot "$1" chown 1000:1000 /opt/masjidconnect/background.png
      fi
    # Optional WiFi: if wifi.conf exists in source root (or IGconf vars set), configure wpa_supplicant for wlan0.
    # wifi.conf format: one line each of SSID=..., PASSWORD=..., COUNTRY=... (COUNTRY default GB).
    - |
      WIFI_SSID=""
      WIFI_PASSWORD=""
      WIFI_COUNTRY="GB"
      if [ -f "${SRCROOT}/wifi.conf" ]; then
        while IFS= read -r line; do
          case "$line" in
            SSID=*)    WIFI_SSID="${line#SSID=}" ;;
            PASSWORD=*) WIFI_PASSWORD="${line#PASSWORD=}" ;;
            COUNTRY=*) WIFI_COUNTRY="${line#COUNTRY=}" ;;
          esac
        done < "${SRCROOT}/wifi.conf"
      fi
      [ -n "${IGconf_masjidconnect_wifi_ssid:-}" ] && WIFI_SSID="${IGconf_masjidconnect_wifi_ssid}"
      [ -n "${IGconf_masjidconnect_wifi_password:-}" ] && WIFI_PASSWORD="${IGconf_masjidconnect_wifi_password}"
      [ -n "${IGconf_masjidconnect_wifi_country:-}" ] && WIFI_COUNTRY="${IGconf_masjidconnect_wifi_country}"
      # Guard: reject description-text values leaked from YAML metadata (e.g. "Optional. WiFi SSID...")
      case "$WIFI_SSID" in "Optional."*|"") WIFI_SSID="" ;; esac
      case "$WIFI_PASSWORD" in "Optional."*|"") WIFI_PASSWORD="" ;; esac
      if [ -n "$WIFI_SSID" ] && [ -n "$WIFI_PASSWORD" ]; then
        mkdir -p "$1/etc/NetworkManager/system-connections"
        NM_FILE="$1/etc/NetworkManager/system-connections/masjidconnect-wifi.nmconnection"
        printf '[connection]\nid=masjidconnect-wifi\ntype=wifi\nautoconnect=true\nautoconnect-priority=100\n\n[wifi]\nmode=infrastructure\nssid=%s\n\n[wifi-security]\nkey-mgmt=wpa-psk\npsk=%s\n\n[ipv4]\nmethod=auto\n\n[ipv6]\nmethod=auto\n' "$WIFI_SSID" "$WIFI_PASSWORD" > "$NM_FILE"
        chroot "$1" chmod 600 /etc/NetworkManager/system-connections/masjidconnect-wifi.nmconnection
      fi
    # Allow first user (pi) to run WiFi setup server, hotspot script, and kill/pkill as root without password.
    - |
      U=$(chroot "$1" getent passwd 1000 | cut -d: -f1)
      if [ -n "$U" ]; then
        printf '%s ALL=(ALL) NOPASSWD: /opt/masjidconnect/deploy/wifi-setup-server.mjs *\n%s ALL=(ALL) NOPASSWD: /opt/masjidconnect/deploy/wifi-hotspot.sh *\n%s ALL=(ALL) NOPASSWD: /usr/bin/nmcli *\n%s ALL=(ALL) NOPASSWD: /sbin/ip *\n%s ALL=(ALL) NOPASSWD: /usr/sbin/ip *\n%s ALL=(ALL) NOPASSWD: /usr/bin/kill *\n%s ALL=(ALL) NOPASSWD: /usr/bin/pkill *\n' "$U" "$U" "$U" "$U" "$U" "$U" "$U" > "$1/etc/sudoers.d/99-masjidconnect-wifi-setup"
        chmod 440 "$1/etc/sudoers.d/99-masjidconnect-wifi-setup"
      fi
    # Allow first user to run self-update script without password (FORCE_UPDATE from admin portal).
    - |
      U=$(chroot "$1" getent passwd 1000 | cut -d: -f1)
      if [ -n "$U" ]; then
        echo "${U} ALL=(ALL) NOPASSWD: /opt/masjidconnect/deploy/update-from-github.sh" > "$1/etc/sudoers.d/99-masjidconnect-update"
        chmod 440 "$1/etc/sudoers.d/99-masjidconnect-update"
      fi
    # Optional: SSH authorized_keys for key-based login (rpi-image/ssh/authorized_keys, gitignored).
    - |
      AUTH_KEYS="${SRCROOT}/ssh/authorized_keys"
      if [ -f "$AUTH_KEYS" ]; then
        H=$(chroot "$1" getent passwd 1000 | cut -d: -f6)
        [ -n "$H" ] && chroot "$1" mkdir -p "${H}/.ssh" && chroot "$1" chmod 700 "${H}/.ssh"
        [ -n "$H" ] && cp "$AUTH_KEYS" "$1${H}/.ssh/authorized_keys" && chroot "$1" chmod 600 "${H}/.ssh/authorized_keys" && chroot "$1" chown -R 1000:1000 "${H}/.ssh"
      fi
    # Optional: GitHub token for private repo releases (rpi-image/secrets/github-token, gitignored).
    - |
      GITHUB_TOKEN_FILE="${SRCROOT}/secrets/github-token"
      if [ -f "$GITHUB_TOKEN_FILE" ]; then
        cp "$GITHUB_TOKEN_FILE" "$1/opt/masjidconnect/.github-token"
        chroot "$1" chmod 600 /opt/masjidconnect/.github-token
        chroot "$1" chown 1000:1000 /opt/masjidconnect/.github-token
      fi
